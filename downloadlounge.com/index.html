<style>
:root{--brand:#0C447C;--brand-rgb:12,68,124;--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:rgba(255,255,255,0.07);--text:#f0f0f8;--muted:rgba(240,240,248,0.45);--card-h:170px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:"Geist",-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:1.25rem;padding:.8rem 1.5rem;background:rgba(10,10,15,0.93);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:"Instrument Serif",serif;font-size:1.15rem;color:var(--text);text-decoration:none;white-space:nowrap;display:flex;align-items:center;gap:.4rem;}
.nav-logo em{font-style:normal;color:var(--brand);}
.search-wrap{flex:1;max-width:500px;margin:0 auto;position:relative;}
.search-input{width:100%;padding:.55rem 1rem .55rem 2.4rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:.85rem;outline:none;transition:border-color .2s,box-shadow .2s;}
.search-input:focus{border-color:rgba(var(--brand-rgb),.5);box-shadow:0 0 0 3px rgba(var(--brand-rgb),.12);}

.search-icon{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.85rem;pointer-events:none;}
.nav-pill{font-size:.72rem;color:var(--muted);white-space:nowrap;background:var(--surface2);border:1px solid var(--border);padding:.3rem .8rem;border-radius:20px;}
.nav-link{font-size:.75rem;color:var(--muted);text-decoration:none;padding:.35rem .8rem;border:1px solid var(--border);border-radius:6px;transition:all .2s;white-space:nowrap;}
.nav-link:hover{color:var(--text);border-color:rgba(var(--brand-rgb),.4);background:rgba(var(--brand-rgb),.08);}
.hero{background:linear-gradient(135deg,rgba(var(--brand-rgb),.18) 0%,rgba(var(--brand-rgb),.04) 50%,transparent 100%);border-bottom:1px solid var(--border);padding:2.25rem 1.5rem 1.75rem;text-align:center;}
.hero h1{font-family:"Instrument Serif",serif;font-size:clamp(1.75rem,4vw,2.75rem);letter-spacing:-0.02em;line-height:1.1;margin-bottom:.4rem;}

.hero-sub{font-size:.9rem;color:var(--muted);font-weight:300;}
.filter-bar{display:flex;align-items:center;gap:.4rem;padding:.75rem 1.5rem;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--surface);scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.cat-btn{font-family:inherit;font-size:.72rem;font-weight:500;color:var(--muted);background:transparent;border:1px solid var(--border);border-radius:6px;padding:.3rem .75rem;cursor:pointer;white-space:nowrap;transition:all .15s;}
.cat-btn:hover,.cat-btn.active{color:var(--text);background:rgba(var(--brand-rgb),.15);border-color:rgba(var(--brand-rgb),.4);font-weight:600;}
.stats{display:flex;gap:1.5rem;padding:.5rem 1.5rem;border-bottom:1px solid var(--border);background:rgba(var(--brand-rgb),.03);font-size:.72rem;color:var(--muted);}
.stats strong{color:var(--text);font-weight:600;}
.grid-wrap{padding:1.25rem 1.5rem 4rem;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.9rem;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s;text-decoration:none;display:block;}
.card:hover{transform:translateY(-3px);box-shadow:0 12px 36px rgba(0,0,0,.55);border-color:rgba(var(--card-rgb),.45);}
.thumb{width:100%;height:var(--card-h);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(var(--card-rgb),.22) 0%,rgba(var(--card-rgb),.07) 100%);}
.thumb::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(var(--card-rgb),.07) 1px,transparent 1px),linear-gradient(90deg,rgba(var(--card-rgb),.07) 1px,transparent 1px);background-size:22px 22px;}
.thumb::after{content:"";position:absolute;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(var(--card-rgb),.22) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);}
.thumb-icon{font-size:2.6rem;position:relative;z-index:1;filter:drop-shadow(0 4px 14px rgba(var(--card-rgb),.5));}
.thumb-cat{position:absolute;bottom:.5rem;right:.5rem;font-size:.6rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.75);background:rgba(0,0,0,.6);backdrop-filter:blur(8px);padding:.2rem .55rem;border-radius:4px;z-index:1;}
.card-body{padding:.75rem .85rem .8rem;}
.card-title{font-family:"Instrument Serif",serif;font-size:.95rem;color:var(--text);line-height:1.25;margin-bottom:.25rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-tagline{font-size:.72rem;color:var(--muted);line-height:1.4;font-weight:300;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-domain{font-size:.65rem;color:rgba(var(--card-rgb),.85);margin-top:.35rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.no-results{grid-column:1/-1;text-align:center;padding:4rem 2rem;color:var(--muted);}
.no-results .big{font-size:2.5rem;display:block;margin-bottom:.75rem;}
footer{padding:1.25rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:.72rem;color:var(--muted);}
footer a{color:var(--muted);text-decoration:none;}footer a:hover{color:var(--text);}
@media(max-width:600px){nav{flex-wrap:wrap;gap:.6rem;padding:.7rem 1rem;}.hero{padding:1.5rem 1rem 1.25rem;}.filter-bar{padding:.6rem 1rem;}.grid-wrap{padding:1rem 1rem 3rem;}.grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.65rem;}--card-h:140px;.thumb-icon{font-size:2rem;}.stats{padding:.4rem 1rem;gap:1rem;}.nav-link{display:none;}footer{flex-direction:column;gap:.35rem;text-align:center;}}
</style>
</head>

function rgb(h){return parseInt(h.slice(1,3),16)+","+parseInt(h.slice(3,5),16)+","+parseInt(h.slice(5,7),16);}
function render(){
